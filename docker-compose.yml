version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: signbridge-db
    environment:
      POSTGRES_USER: signbridge
      POSTGRES_PASSWORD: signbridge123
      POSTGRES_DB: signbridge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: signbridge-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
